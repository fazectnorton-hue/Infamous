<!DOCTYPE html>
<html>
<head>
  <title>INFAMOUS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }
    nav {
      padding: 20px;
      font-weight: bold;
      letter-spacing: 4px;
      border-bottom: 1px solid #222;
    }
    .hero {
      padding: 120px 20px;
    }
    .btn {
      padding: 15px 30px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      font-weight: bold;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 60px 20px;
    }
    .card {
      background: #111;
      padding: 20px;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<nav>INFAMOUS</nav>

<section class="hero">
  <h1>BUILT TO BE INFAMOUS</h1>
  <p>Premium streetwear for those who refuse to blend in.</p>
  <button class="btn">SHOP NOW</button>
</section>

<section class="products">
  <div class="card">
    <h3>Oversized Tee</h3>
    <p>$45</p>
  </div>
  <div class="card">
    <h3>Signature Hoodie</h3>
    <p>$95</p>
  </div>
  <div class="card">
    <h3>Cargo Pants</h3>
    <p>$120</p>
  </div>
  <div class="card">
    <h3>Snapback</h3>
    <p>$40</p>
  </div>
</section>

</body>
</html>
